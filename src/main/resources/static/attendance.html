<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Điểm Danh | AttendSys</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="layout">
        <div id="sidebar-container"></div>
        <main class="main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">🕐 Điểm Danh</h1>
                    <p class="page-subtitle">Quản lý điểm danh hàng ngày</p>
                </div>
            </div>

            <!-- Check-in card -->
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:24px;align-items:start">
                <div class="card" style="text-align:center">
                    <p class="card-title">Điểm Danh Hôm Nay</p>
                    <div id="clock"
                        style="font-size:2.4rem;font-weight:700;color:var(--primary);letter-spacing:2px;margin:12px 0">
                    </div>
                    <div id="clockDate" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px"></div>
                    <!-- <button class="btn btn-success" style="width:100%;padding:14px;font-size:1rem" id="checkInBtn"
                        onclick="doCheckIn()">
                        ✅ Điểm Danh Ngay
                    </button> -->
                    <div id="checkInResult" style="margin-top:14px;font-size:0.85rem"></div>
                </div>

                <div class="card">
                    <p class="card-title">📋 Lịch Sử Điểm Danh</p>
                    <div class="table-wrapper">
                        <table id="attendanceTable">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Nhân Viên</th>
                                    <th>Giờ Check-in</th>
                                    <th>Trạng Thái</th>
                                    <th>Ghi Chú</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceBody">
                                <tr>
                                    <td colspan="5" style="text-align:center;color:var(--text-muted)">Đang tải...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = renderSidebar('attendance');

        // Live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('clockDate').textContent = now.toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function doCheckIn() {
            const btn = document.getElementById('checkInBtn');
            btn.disabled = true; btn.textContent = '⏳ Đang ghi nhận...';
            try {
                const res = await apiPost('/attendance/check-in');
                const statusMap = { 'ON_TIME': '✅ Đúng giờ', 'LATE': '⚠️ Muộn' };
                document.getElementById('checkInResult').innerHTML =
                    `<span style="color:var(--success)">Điểm danh thành công!</span><br>
         Trạng thái: <strong>${statusMap[res.status] || res.status}</strong><br>
         Giờ: ${formatDateTime(res.checkInTime)}`;
                showToast('Điểm danh thành công!', 'success');
                btn.textContent = '✅ Đã điểm danh';
                loadHistory();
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('checkInResult').innerHTML = `<span style="color:var(--danger)">${err.message}</span>`;
                btn.disabled = false; btn.textContent = '✅ Điểm Danh Ngay';
            }
        }

        async function loadHistory() {
            try {
                // Admins/Managers can see all; others need dedicated endpoint (if added)
                // For now, fetch all — backend will protect accordingly
                const list = await apiGet('/attendance').catch(() => []);
                const tbody = document.getElementById('attendanceBody');
                if (!list || list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Chưa có dữ liệu</td></tr>';
                    return;
                }
                tbody.innerHTML = list.map((a, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${a.user?.username || '—'}</td>
          <td>${formatDateTime(a.checkInTime)}</td>
          <td>
            <span class="badge ${a.status === 'ON_TIME' ? 'badge-green' : 'badge-amber'}">
              ${a.status === 'ON_TIME' ? '✅ Đúng giờ' : '⚠️ Muộn'}
            </span>
          </td>
          <td>${a.note || '—'}</td>
        </tr>`).join('');
            } catch {
                document.getElementById('attendanceBody').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Không có quyền xem lịch sử tất cả</td></tr>';
            }
        }

        loadHistory();
    </script>
</body>

</html>
