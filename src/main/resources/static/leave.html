<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nghỉ Phép | AttendSys</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="layout">
        <div id="sidebar-container"></div>
        <main class="main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">📅 Nghỉ Phép</h1>
                    <p class="page-subtitle">Quản lý đơn xin nghỉ phép</p>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">➕ Tạo Đơn Mới</button>
            </div>
            <div class="search-box">
              <div class="search-icon">🔍</div>
              <input type="text" id="searchName" class="search-input" 
                 placeholder="Tìm theo tên nhân viên..."
               oninput="applyFilters()">
            </div>
    <div class="card">
    <div class="filter-box" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
        <label for="leaveDate" style="font-weight: 500;">📅 Lọc theo ngày:</label>
        <input type="date" id="leaveDate" class="form-control" style="width: 200px;">
        <button id="clearFilterBtn" class="btn btn-outline" style="padding: 8px 15px;" onclick="clearFilter()">✕ Xóa lọc</button>
        <span id="displayDate" style="margin-left: 10px; font-weight: bold; color: #4361ee;"></span>
    </div>
    
    <p class="card-title">📋 Danh Sách Đơn Nghỉ Phép</p>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nhân Viên</th>
                    <th>Từ Ngày</th>
                    <th>Đến Ngày</th>   
                    <th>Lý Do</th>
                    <th>Trạng Thái</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody id="leaveTableBody">
                <tr>
                    <td colspan="7" style="text-align:center;color:var(--text-muted)">Đang tải...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

    <!-- Modal: Tạo đơn nghỉ phép -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <p class="modal-title">📅 Tạo Đơn Nghỉ Phép</p>
                <button class="modal-close" onclick="closeCreateModal()">✕</button>
            </div>
            <form id="createForm">
                <div class="form-group">
                    <label class="form-label">Từ Ngày</label>
                    <input type="date" id="startDate" class="form-control" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Đến Ngày</label>
                    <input type="date" id="endDate" class="form-control" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Lý Do</label>
                    <textarea id="reason" class="form-control" rows="3"
                        placeholder="Nhập lý do nghỉ phép..."></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeCreateModal()">Hủy</button>
                <button class="btn btn-primary" onclick="submitLeave()">Gửi Đơn</button>
            </div>
        </div>
    </div>

    <!-- Modal: Từ chối đơn -->
    <div class="modal-overlay" id="rejectModal">
        <div class="modal">
            <div class="modal-header">
                <p class="modal-title">❌ Từ Chối Đơn</p>
                <button class="modal-close" onclick="closeRejectModal()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">Lý Do Từ Chối</label>
                <textarea id="rejectReason" class="form-control" rows="3"
                    placeholder="Nhập lý do từ chối..."></textarea>
            </div>
            <input type="hidden" id="rejectId" />
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeRejectModal()">Hủy</button>
                <button class="btn btn-danger" onclick="confirmReject()">Xác Nhận Từ Chối</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/api.js"></script>
  
</script> 
    <script>
    requireAuth();
    document.getElementById('sidebar-container').innerHTML = renderSidebar('leave');
    
    // Lấy ngày hiện tại
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    const todayFormatted = `${year}-${month}-${day}`;
    
    document.getElementById('startDate').value = todayFormatted;
    document.getElementById('endDate').value = todayFormatted;
    document.getElementById('leaveDate').value = '';

    const role = getRole();
    const canApprove = role === 'ADMIN' || role === 'MANAGER';

    // Hàm format ngày hiển thị
    function formatDisplayDate(dateStr) {
        if (!dateStr) return '—';
        if (dateStr.includes('-')) {
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
        }
        return dateStr;
    }

    // Hàm load dữ liệu - GỌI CHUNG 1 HÀM
    async function loadLeaveData() {
        const tbody = document.getElementById('leaveTableBody');
        const date = document.getElementById('leaveDate').value;
        
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Đang tải...</td></tr>';

        try {
            let url;
            if (date) {
                // Nếu có lọc theo ngày
                url = `/leave?date=${date}`;
            } else {
                // Không lọc - lấy tất cả
                url = canApprove ? '/leave/all' : '/leave/my';
            }
            
            console.log('Loading data from:', url);
            const list = await apiGet(url);
            console.log('Received data:', list);
            
            renderLeaveTable(tbody, list);
        } catch (err) {
            console.error('Error loading data:', err);
            tbody.innerHTML = `<tr><td colspan="7" style="color:red">Lỗi: ${err.message}</td></tr>`;
        }
    }

    // Hàm render bảng
    function renderLeaveTable(tbody, list) {
        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Không có dữ liệu</td></tr>';
            return;
        }

        const statusMap = {
            'PENDING': '<span class="badge badge-amber">⏳ Chờ Duyệt</span>',
            'APPROVED': '<span class="badge badge-green">✅ Đã Duyệt</span>',
            'REJECTED': '<span class="badge badge-red">❌ Từ Chối</span>'
        };

        tbody.innerHTML = list.map((l, i) => {
            const startDate = formatDisplayDate(l.startDate);
            const endDate = formatDisplayDate(l.endDate);
            
            return `
                <tr>
                    <td>${i + 1}</td>
                    <td>${l.user?.username || '—'}</td>
                    <td>${startDate}</td>
                    <td>${endDate}</td>
                    <td>${l.reason || '—'}</td>
                    <td>${statusMap[l.status] || l.status}</td>
                    <td>
                        ${canApprove && l.status === 'PENDING' ? 
                            `<button class="btn btn-success btn-sm" onclick="approveLeave(${l.id})">Duyệt</button>` : 
                            '—'
                        }
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Hàm lọc theo ngày
    async function applyFilter() {
        const date = document.getElementById('leaveDate').value;
        const displaySpan = document.getElementById('displayDate');
        
        if (date) {
            const [y, m, d] = date.split('-');
            displaySpan.textContent = `Đang lọc: ${d}/${m}/${y}`;
        } else {
            displaySpan.textContent = '';
        }
        
        await loadLeaveData();
    }

    // Hàm xóa lọc
    function clearFilter() {
        document.getElementById('leaveDate').value = '';
        document.getElementById('displayDate').textContent = '';
        loadLeaveData();
    }

    // Tìm kiếm theo tên (kết hợp với lọc ngày nếu có)
    async function searchByName() {
        const name = document.getElementById('searchName').value.trim();
        const date = document.getElementById('leaveDate').value;
        const tbody = document.getElementById('leaveTableBody');
        
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Đang tìm kiếm...</td></tr>';

        try {
            let params = new URLSearchParams();
            if (name) params.append('name', name);
            if (date) params.append('date', date);
            
            const queryString = params.toString();
            const url = queryString ? `/leave?${queryString}` : (canApprove ? '/leave/all' : '/leave/my');
            
            const list = await apiGet(url);
            renderLeaveTable(tbody, list);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="7" style="color:red">Lỗi: ${err.message}</td></tr>`;
        }
    }

    // Gắn sự kiện
    document.getElementById('searchName').addEventListener('input', searchByName);
    document.getElementById('leaveDate').addEventListener('change', applyFilter);

    // Khởi tạo trang
    loadLeaveData();

    // Các hàm Modal giữ nguyên
    function openCreateModal() { 
        document.getElementById('createModal').classList.add('open'); 
    }
    
    function closeCreateModal() { 
        document.getElementById('createModal').classList.remove('open'); 
    }

    function openRejectModal(id) {
        document.getElementById('rejectId').value = id;
        document.getElementById('rejectReason').value = '';
        document.getElementById('rejectModal').classList.add('open');
    }
    
    function closeRejectModal() { 
        document.getElementById('rejectModal').classList.remove('open'); 
    }

    async function submitLeave() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const reason = document.getElementById('reason').value;
        
        if (!startDate || !endDate) { 
            showToast('Vui lòng chọn ngày', 'error'); 
            return; 
        }
        
        try {
            await apiPost('/leave', { startDate, endDate, reason });
            showToast('Gửi đơn thành công!', 'success');
            closeCreateModal();
            loadLeaveData(); // Load lại dữ liệu
        } catch (err) { 
            showToast(err.message, 'error'); 
        }
    }

    async function approveLeave(id) {
        try {
            await apiPut(`/leave/${id}/status`, { approved: true });
            showToast('Đã duyệt đơn!', 'success');
            loadLeaveData(); // Load lại dữ liệu
        } catch (err) { 
            showToast(err.message, 'error'); 
        }
    }

    async function confirmReject() {
        const id = document.getElementById('rejectId').value;
        const rejectReason = document.getElementById('rejectReason').value;
        
        try {
            await apiPut(`/leave/${id}/status`, { approved: false, rejectReason });
            showToast('Đã từ chối đơn!', 'info');
            closeRejectModal();
            loadLeaveData(); // Load lại dữ liệu
        } catch (err) { 
            showToast(err.message, 'error'); 
        }
    }
</script>
</body>

</html>
