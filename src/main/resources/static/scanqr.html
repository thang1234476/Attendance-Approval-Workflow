<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét mã điểm danh | AttendSys</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <!-- Thanh gạt nhỏ gọn bên góc trái -->
            <div class="switch-wrapper">
                <span class="switch-label">🎯 Hành động:</span>
                <div class="switch-toggle" id="actionToggle">
                    <div class="switch-options">
                        <div class="switch-option">CHECK-IN</div>
                        <div class="switch-option">CHECK-OUT</div>
                    </div>
                    <div class="switch-slider" id="actionSlider">✅</div>
                </div>
            </div>

            <div class="back-home-wrapper">
                <button class="btn-home" onclick="window.location.href='dashboard.html'" title="Về trang chủ">
                    📊
                </button>
            </div>
            <div class="header" style="text-align: center; margin: 20px;">
                <h1>Quét mã điểm danh</h1>
                <p>Vui lòng quét mã QR để điểm danh</p>
            </div>
            <div class="card">
                <div class="card-body">
                    <div class="qr-container">
                        <div id="qrcode">
                            <script src="https://unpkg.com/html5-qrcode"></script>
                            <div class="card">
                                <h2 class="card-title">📷 Quét Mã Nhân Viên</h2>
                                <div id="qr-reader" style="width: 100%; max-width: 500px; margin: auto;"></div>
                                <div id="qr-reader-results" style="margin-top: 20px; font-weight: bold; color: green;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <script src="js/api.js"></script>
            <script>
                // Biến trạng thái hành động: 'checkin' hoặc 'checkout'
                let currentAction = 'checkin';
                const slider = document.getElementById('actionSlider');
                const toggle = document.getElementById('actionToggle');

                // Xử lý click chuyển đổi hành động
                toggle.addEventListener('click', () => {
                    if (currentAction === 'checkin') {
                        currentAction = 'checkout';
                        slider.classList.add('checkout-mode');
                        slider.innerHTML = '🚪';
                    } else {
                        currentAction = 'checkin';
                        slider.classList.remove('checkout-mode');
                        slider.innerHTML = '✅';
                    }
                    showToast(`Đã chuyển sang chế độ ${currentAction === 'checkin' ? 'CHECK-IN' : 'CHECK-OUT'}`, 'info');
                });

                // Quét QR
                let isScanning = false;
                function onScanSuccess(decodedText, decodedResult) {
                    if (isScanning) return;
                    isScanning = true;

                    document.getElementById('qr-reader-results').innerText = "ID: " + decodedText;

                    if (currentAction === 'checkin') {
                        // Gọi API check-in
                        apiPost('/attendance/check-in/qr', { employeeId: decodedText })
                            .then(res => {
                                const statusMap = { 'ON_TIME': '✅ Đúng giờ', 'LATE': '⚠️ Muộn' };
                                const msg = `Check-in thành công! Trạng thái: ${statusMap[res.status] || res.status}`;
                                document.getElementById('qr-reader-results').innerHTML = msg;
                                showToast(msg, 'success');
                                setTimeout(() => { isScanning = false; }, 3000);
                            })
                            .catch(err => {
                                showToast("❌ Lỗi: " + err.message, "error");
                                setTimeout(() => { isScanning = false; }, 2000);
                            });
                    } else {
                        // Gọi API check-out
                        apiPost('/attendance/checkout', { userId: parseInt(decodedText) })
                            .then(res => {
                                const statusMap = { 'EARLY': '⚠️ Về sớm', 'ON_TIME': '✅ Đúng giờ', 'LATE': '⌛ Về muộn' };
                                const msg = `Check-out thành công! Giờ ra: ${formatDateTime(res.checkOutTime)}<br>Tổng giờ: ${res.totalHours?.toFixed(2)} giờ<br>Trạng thái: ${statusMap[res.checkoutStatus] || res.checkoutStatus}`;
                                document.getElementById('qr-reader-results').innerHTML = msg;
                                showToast('Check-out thành công!', 'success');
                                setTimeout(() => { isScanning = false; }, 3000);
                            })
                            .catch(err => {
                                showToast("❌ Lỗi: " + err.message, "error");
                                setTimeout(() => { isScanning = false; }, 2000);
                            });
                    }
                }

                // Cấu hình trình quét
                let html5QrcodeScanner = new Html5QrcodeScanner(
                    "qr-reader",
                    {
                        fps: 10,
                        qrbox: 250,
                        aspectRatio: 1.0
                    }
                );
                html5QrcodeScanner.render(onScanSuccess);
            </script>
        </div>
    </div>
</body>

</html>
