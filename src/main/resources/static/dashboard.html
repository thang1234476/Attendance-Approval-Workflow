<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | AttendSys</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="layout">
        <div id="sidebar-container"></div>
        <main class="main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">📊 Dashboard VKU attendance</h1>
                    <p class="page-subtitle" id="dateSubtitle"></p>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon blue">👥</div>
                    <div>
                        <div class="stat-value" id="totalEmp">—</div>
                        <div class="stat-label">Tổng nhân viên</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">✅</div>
                    <div>
                        <div class="stat-value" id="todayIn">—</div>
                        <div class="stat-label">Đã điểm danh hôm nay</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber">⚠️</div>
                    <div>
                        <div class="stat-value" id="lateCount">—</div>
                        <div class="stat-label">Đi muộn</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">🗓️</div>
                    <div>
                        <div class="stat-value" id="pendingLeave">—</div>
                        <div class="stat-label">Đơn nghỉ phép chờ duyệt</div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card" style="max-width:400px">
                <p class="card-title">⚡ Thao Tác Nhanh</p>
                <div style="display:flex;gap:12px;flex-wrap:wrap">
                    <!-- <button class="btn btn-success" id="checkInBtn" onclick="doCheckIn()">🕐 Điểm Danh Ngay</button> -->
                    <a href="leave.html" class="btn btn-outline">📅 Tạo Đơn Nghỉ Phép</a>
                </div>
                <p id="checkinMsg" style="margin-top:12px;font-size:0.84rem;color:var(--text-muted)"></p>
            </div>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        requireAuth();
        document.getElementById('sidebar-container').innerHTML = renderSidebar('dashboard');

        const now = new Date();
        document.getElementById('dateSubtitle').textContent =
            now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        async function loadStats() {
            try {
                const data = await apiGet('/admin/dashboard/stats');
                document.getElementById('totalEmp').textContent = data.totalEmployees;
                document.getElementById('todayIn').textContent = data.todayCheckIns;
                document.getElementById('lateCount').textContent = data.lateCount;
                document.getElementById('pendingLeave').textContent = data.pendingLeaveRequests;
            } catch {
                // Non-admin: hide stats
                document.getElementById('statsGrid').style.display = 'none';
            }
        }

        async function doCheckIn() {
            const btn = document.getElementById('checkInBtn');
            btn.disabled = true;
            btn.textContent = '⏳...';
            try {
                const res = await apiPost('/attendance/check-in');
                const statusMap = { 'ON_TIME': '✅ Đúng giờ', 'LATE': '⚠️ Muộn' };
                const msg = `Điểm danh thành công! Trạng thái: <strong>${statusMap[res.status] || res.status}</strong>`;
                document.getElementById('checkinMsg').innerHTML = msg;
                showToast('Điểm danh thành công!', 'success');
                loadStats();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🕐 Điểm Danh Ngay';
            }
        }

        loadStats();
    </script>
</body>

</html>
