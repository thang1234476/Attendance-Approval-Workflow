name: Deployment Attendance System

on:
  push:
    branches: [ "main" ] # Tự động chạy khi ông push code lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- BƯỚC 1: CHUẨN BỊ CODE ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- BƯỚC 2: BUILD FILE JAR (Làm trên GitHub để tiết kiệm RAM VPS) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # --- BƯỚC 3: ĐẨY FILE LÊN VPS (Sử dụng SSH Key) ---
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Chỉ đích danh file JAR, không lấy cả folder target rườm rà
          source: "target/AttendanceSystem-0.0.1-SNAPSHOT.jar,Dockerfile,docker-compose.yml" 
          target: "~/attendance"
          strip_components: 1

      # --- BƯỚC 4: KÍCH HOẠT DOCKER TRÊN VPS ---
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/attendance
            # Build lại Image từ file JAR mới đẩy lên
            docker-compose up -d --build
            # Dọn dẹp các Image cũ/thừa để giải phóng bộ nhớ VPS
            docker image prune -f
