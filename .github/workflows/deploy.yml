name: Deploy Attendance System to VPS

on:
  push:
    branches: [ "main" ] # Tự động chạy khi ông push code vào nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt Java 17 để build (GitHub cho RAM 7GB, build cực nhanh)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build file JAR (Bỏ qua chạy test để tiết kiệm thời gian)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đẩy các file cần thiết lên VPS qua SCP
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Nếu ông dùng mật khẩu thay vì SSH Key, hãy đổi 'key' thành 'password'
          source: "target/*.jar,Dockerfile,docker-compose.yml"
          target: "~/attendance"
          strip_components: 0

      # 5. SSH vào VPS và ra lệnh cho Docker khởi động lại
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/attendance
            # Build lại Image từ file JAR mới đẩy lên (không tốn RAM build Maven trên VPS)
            docker-compose up -d --build
            # Dọn dẹp các Image cũ (Dân SQA gọi là dọn dẹp môi trường)
            docker image prune -f
