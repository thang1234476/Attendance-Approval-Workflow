name: Deployment Attendance System

on:
  push:
    branches: [ "main" ] # Tự động chạy khi ông push code lên nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- BƯỚC 1: CHUẨN BỊ CODE ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- BƯỚC 2: BUILD FILE JAR (Làm trên GitHub để tiết kiệm RAM VPS) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # --- BƯỚC 3: ĐẨY FILE LÊN VPS ---
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          # Ghi chính xác tên file JAR từ pom.xml
          source: "target/attendance-system-0.0.1-SNAPSHOT.jar,Dockerfile,docker-compose.yml"
          target: "~/attendance"
          strip_components: 1

      # --- BƯỚC 4: KÍCH HOẠT DOCKER ---
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }} # <--- ĐỔI TỪ key THÀNH password
          script: |
            cd ~/attendance
            docker compose up -d --no-deps attendance-app
            docker image prune -f
